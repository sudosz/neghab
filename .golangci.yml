version: "2"
run:
  go: "1.22"
  tests: true
linters:
  enable:
    - misspell
    - nilerr
    - noctx
    - prealloc
    - unconvert
    - unparam
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    govet:
      enable:
        - nilness
        - shadow
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - unparam
        path: _test\.go
      - linters:
          - unparam
        path: logger/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/sudosz/neghab
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
