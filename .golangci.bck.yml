# Neghab — golangci-lint Configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 3m
  tests: true
  go: "1.22"

linters:
  enable:
    - errcheck      # Check for unhandled errors
    - gosimple      # Simplify code
    - govet         # Go vet
    - ineffassign   # Ineffectual assignments
    - staticcheck   # Static analysis
    - unused        # Unused variables/functions
    - gofmt         # Formatting
    - goimports     # Import formatting
    - misspell      # Spelling errors
    - unconvert     # Unnecessary type conversions
    - unparam       # Unused function parameters
    - prealloc      # Slice preallocation suggestions
    - exportloopref # Loop variable references
    - nilerr        # Nil error checks
    - noctx         # Missing context.Context

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  govet:
    enable:
      - nilness
      - shadow
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/sudosz/neghab
  misspell:
    locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Exclude some linters from test files
    - path: _test\.go
      linters:
        - errcheck
        - unparam
    # Allow unused parameters in slog Handler interface methods
    - path: logger/
      linters:
        - unparam
