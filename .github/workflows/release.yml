name: release

# ── Trigger on push to main and on version tags ───────────────────
on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "PROJECT.md"
      - ".gitignore"
  pull_request:
    branches:
      - main
  workflow_dispatch:

# ── Jobs ───────────────────────────────────────────────────────────
jobs:

  # ── 1a. Lint (golangci-lint) ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m

  # ── 1b. Vulnerability Scan (govulncheck) ────────────────────────────
  vulncheck:
    name: Vulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...

  # ── 2. Test (Matrix across Go versions) ────────────────────────────
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    needs: [lint, vulncheck]
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "1.23", "stable"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -v -race -count=1 -timeout=120s ./...

      - name: Build (dry-run)
        run: go build -o /dev/null .

  # ── 3. GoReleaser (only on semver tag push) ────────────────────────
  goreleaser:
    name: Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to publish releases
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
